<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Simples</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="calculadora">
        <h1>Calculadora do Grupo</h1>
        
        <input type="number" id="num1" placeholder="Digite o 1º número">
        <input type="number" id="num2" placeholder="Digite o 2º número">
        
        <div class="botoes">
            <button id="btn-somar">Soma (+)</button>
            <button id="btn-subtrair">Subtração (-)</button>
            <button id="btn-multiplicar">Multiplicação (*)</button>
            <button id="btn-dividir">Divisão (/)</button>
        </div>

        <h2>Resultado: <span id="resultado">0</span></h2>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
